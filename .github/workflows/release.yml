name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish Linux packages
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from VERSION / tag
        id: version
        run: |
          set -euo pipefail

          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file is missing at repo root"
            exit 1
          fi

          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [[ ! "$FILE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "::error::VERSION must look like 1.2.3 (got: $FILE_VERSION)"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
              echo "::error::Tag must look like v1.2.3 (got: $TAG)"
              exit 1
            fi
            VERSION="${TAG#v}"
            if [[ "$VERSION" != "$FILE_VERSION" ]]; then
              echo "::error::Tag $TAG does not match VERSION file ($FILE_VERSION). Update VERSION then retag."
              exit 1
            fi
          else
            # workflow_dispatch: release from VERSION file
            VERSION="$FILE_VERSION"
            TAG="v${VERSION}"
          fi

          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$TAG version=$VERSION prerelease=$IS_PRERELEASE"

      - name: Sync package.json version
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version -> $VERSION"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install system deps (rpm builds)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build packages (AppImage, deb, rpm)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run dist:all

      - name: List release artifacts
        run: |
          ls -lah release/
          ls -lah release/*.{AppImage,deb,rpm} 2>/dev/null || true

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: notion-for-linux-${{ steps.version.outputs.version }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Notion for Linux ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          body: |
            ## Notion for Linux ${{ steps.version.outputs.version }}

            Unofficial Notion desktop client for Linux.

            ### Downloads

            | Package | Install |
            |---------|---------|
            | **AppImage** | `chmod +x notion-for-linux-*.AppImage && ./notion-for-linux-*.AppImage` |
            | **Debian / Ubuntu** | `sudo apt install ./notion-for-linux-*.deb` |
            | **Fedora / RHEL** | `sudo dnf install ./notion-for-linux-*.rpm` |

            > Not affiliated with Notion Labs, Inc.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
